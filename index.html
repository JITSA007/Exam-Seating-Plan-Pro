<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Seating Plan Generator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for Excel Import/Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .grid-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .grid-table th, .grid-table td { border: 1px solid #e5e7eb; padding: 0.5rem; text-align: center; font-size: 0.875rem; }
        .grid-table th { background-color: #f3f4f6; font-weight: 600; }
        .seat-error { background-color: #fef2f2; color: #dc2626; font-weight: bold; }
        
        /* Print Styles */
        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            #printArea { display: block !important; width: 100%; }
            .room-page { page-break-after: always; break-after: page; }
            .room-page:last-child { page-break-after: auto; break-after: auto; }
            .grid-table th { background-color: #e5e7eb !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
            .seat-error { background-color: #fef2f2 !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-4 md:p-8">

    <!-- MAIN APP WRAPPER (Hidden when printing) -->
    <div id="appWrapper" class="max-w-7xl mx-auto space-y-6 no-print">
        
        <!-- App Header & Data Controls -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-700">Exam Seating Plan Pro</h1>
                <p class="text-gray-500 mt-1 text-sm">Configure, generate, export, and print exam seating arrangements.</p>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="downloadSample()" class="px-4 py-2 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded text-sm font-medium transition">📄 Sample Excel</button>
                <label class="px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded text-sm font-medium transition cursor-pointer">
                    📂 Import Excel
                    <!-- Changed to accept Excel formats -->
                    <input type="file" id="importFile" accept=".xlsx, .xls, .csv" class="hidden" onchange="importPlan(event)">
                </label>
                <button onclick="exportPlan()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium transition">💾 Export to Excel</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Column 1: Exam Details -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-1">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2">1. Exam Details</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">University / Institute Name</label>
                        <input type="text" id="uniName" value="Awesome University" class="w-full border rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                        <input type="text" id="deptName" value="Department of Computer Science" class="w-full border rounded-md px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Examination Date</label>
                        <input type="date" id="examDate" value="2027-03-06" class="w-full border rounded-md px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Shift / Time</label>
                        <input type="text" id="examShift" value="Shift 2: Afternoon (1:30 PM - 3:30 PM)" class="w-full border rounded-md px-3 py-2 text-sm">
                    </div>
                </div>
            </div>

            <!-- Column 2: Batches -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-1">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2 flex justify-between items-center">
                    <span>2. Student Batches</span>
                    <span id="totalStudentsBadge" class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">0</span>
                </h2>
                
                <div id="batchesList" class="space-y-2 mb-4 max-h-[250px] overflow-y-auto pr-1">
                    <!-- Batches injected via JS -->
                </div>
                
                <div class="bg-gray-50 border p-3 rounded-lg">
                    <h3 class="text-xs font-semibold uppercase text-gray-500 mb-2">Add Batch</h3>
                    <div class="grid grid-cols-1 gap-2 mb-2">
                        <input type="text" id="bName" placeholder="Program Name (e.g., BCA 24)" class="border rounded px-2 py-1.5 text-sm w-full">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="number" id="bCount" placeholder="Total Students" class="border rounded px-2 py-1.5 text-sm w-full">
                        <input type="text" id="bPrefix" placeholder="Roll Prefix (e.g., 24BCA)" class="border rounded px-2 py-1.5 text-sm w-full">
                    </div>
                    <button onclick="addBatch()" class="w-full bg-blue-600 text-white py-1.5 rounded text-sm hover:bg-blue-700 transition">Add Batch</button>
                </div>
            </div>

            <!-- Column 3: Rooms -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-1">
                <h2 class="text-lg font-semibold mb-4 border-b pb-2 flex justify-between items-center">
                    <span>3. Examination Rooms</span>
                    <span id="totalSeatsBadge" class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">0</span>
                </h2>
                
                <div id="roomsList" class="space-y-2 mb-4 max-h-[250px] overflow-y-auto pr-1">
                    <!-- Rooms injected via JS -->
                </div>
                
                <div class="bg-gray-50 border p-3 rounded-lg">
                    <h3 class="text-xs font-semibold uppercase text-gray-500 mb-2">Add Room</h3>
                    <div class="grid grid-cols-1 gap-2 mb-2">
                        <input type="text" id="rName" placeholder="Room Name (e.g., FC1)" class="border rounded px-2 py-1.5 text-sm w-full">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="number" id="rRows" placeholder="Rows (e.g., 10)" class="border rounded px-2 py-1.5 text-sm w-full">
                        <input type="number" id="rCols" placeholder="Columns (e.g., 6)" class="border rounded px-2 py-1.5 text-sm w-full">
                    </div>
                    <button onclick="addRoom()" class="w-full bg-blue-600 text-white py-1.5 rounded text-sm hover:bg-blue-700 transition">Add Room</button>
                </div>
            </div>

        </div>

        <!-- Action Area -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
            <div id="stats" class="text-sm font-medium"></div>
            <div class="flex gap-3">
                <button onclick="resetData()" class="bg-red-50 text-red-600 border border-red-200 px-6 py-3 rounded-lg font-bold shadow-sm hover:bg-red-100 transition">
                    Reset All
                </button>
                <button onclick="generatePlan()" class="bg-green-600 text-white px-8 py-3 rounded-lg font-bold shadow-md hover:bg-green-700 hover:shadow-lg transition">
                    ▶ Generate Seating Plan
                </button>
                <button id="printBtn" onclick="window.print()" class="hidden bg-gray-800 text-white px-6 py-3 rounded-lg font-bold shadow-md hover:bg-gray-900 transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Print Plan
                </button>
            </div>
        </div>

    </div>

    <!-- PRINT AREA (Hidden on screen until generated, visible on print) -->
    <div id="printArea" class="hidden max-w-5xl mx-auto bg-white p-4 md:p-8 mt-6 rounded-xl shadow-sm border border-gray-100">
        <!-- Warnings / Output -->
        <div id="warningsArea" class="bg-red-50 border border-red-200 text-red-800 p-4 rounded-lg mb-6 hidden no-print"></div>
        <div id="roomsOutput" class="space-y-12"></div>
    </div>

    <script>
        // State Management
        let appState = {
            batches: [
                { id: 1, name: "BCA FSD 25", count: 52, prefix: "25FSD" },
                { id: 2, name: "BCA FSD 24", count: 38, prefix: "24FSD" },
                { id: 3, name: "B.Tech RPA 25", count: 38, prefix: "25RPA" },
                { id: 4, name: "B.Tech RPA 24", count: 38, prefix: "24RPA" }
            ],
            rooms: [
                { id: 1, name: "FC1", rows: 10, cols: 6 },
                { id: 2, name: "FC2", rows: 10, cols: 6 },
                { id: 3, name: "FC3", rows: 6, cols: 7 }
            ]
        };

        // UI Render Functions
        function renderUI() {
            // Batches
            const batchesList = document.getElementById('batchesList');
            batchesList.innerHTML = appState.batches.map((b, index) => `
                <div class="flex justify-between items-center bg-white p-2.5 rounded border border-gray-200 hover:border-blue-300 transition">
                    <div>
                        <div class="font-semibold text-sm text-gray-800">${b.name}</div>
                        <div class="text-[11px] text-gray-500 uppercase tracking-wide mt-0.5">${b.count} Students • Prefix: ${b.prefix}</div>
                    </div>
                    <button onclick="removeBatch(${index})" class="text-gray-400 hover:text-red-500 transition px-2">✕</button>
                </div>
            `).join('');

            // Rooms
            const roomsList = document.getElementById('roomsList');
            roomsList.innerHTML = appState.rooms.map((r, index) => `
                <div class="flex justify-between items-center bg-white p-2.5 rounded border border-gray-200 hover:border-blue-300 transition">
                    <div>
                        <div class="font-semibold text-sm text-gray-800">${r.name}</div>
                        <div class="text-[11px] text-gray-500 uppercase tracking-wide mt-0.5">${r.rows}x${r.cols} grid • ${r.rows * r.cols} Seats</div>
                    </div>
                    <button onclick="removeRoom(${index})" class="text-gray-400 hover:text-red-500 transition px-2">✕</button>
                </div>
            `).join('');

            updateStats();
        }

        function updateStats() {
            const totalStudents = appState.batches.reduce((sum, b) => sum + parseInt(b.count), 0);
            const totalSeats = appState.rooms.reduce((sum, r) => sum + (parseInt(r.rows) * parseInt(r.cols)), 0);
            
            document.getElementById('totalStudentsBadge').innerText = totalStudents;
            document.getElementById('totalSeatsBadge').innerText = totalSeats;

            const statsDiv = document.getElementById('stats');
            let html = `Total Students: <span class="font-bold">${totalStudents}</span> &nbsp;|&nbsp; Total Capacity: <span class="font-bold">${totalSeats}</span>`;
            
            if (totalStudents > totalSeats) {
                html += `<div class="text-red-600 mt-1 flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> Shortage of ${totalStudents - totalSeats} seats</div>`;
            } else {
                html += `<div class="text-green-600 mt-1 text-sm">✓ Capacity is sufficient</div>`;
            }
            statsDiv.innerHTML = html;
        }

        function addBatch() {
            const name = document.getElementById('bName').value.trim();
            const count = parseInt(document.getElementById('bCount').value);
            const prefix = document.getElementById('bPrefix').value.trim();
            if(name && count && prefix) {
                appState.batches.push({ id: Date.now(), name, count, prefix });
                renderUI();
                document.getElementById('bName').value = ''; document.getElementById('bCount').value = ''; document.getElementById('bPrefix').value = '';
            } else {
                alert("Please fill all batch details.");
            }
        }

        function addRoom() {
            const name = document.getElementById('rName').value.trim();
            const rows = parseInt(document.getElementById('rRows').value);
            const cols = parseInt(document.getElementById('rCols').value);
            if(name && rows && cols) {
                appState.rooms.push({ id: Date.now(), name, rows, cols });
                renderUI();
                document.getElementById('rName').value = ''; document.getElementById('rRows').value = ''; document.getElementById('rCols').value = '';
            } else {
                alert("Please fill all room details.");
            }
        }

        function removeBatch(index) { appState.batches.splice(index, 1); renderUI(); }
        function removeRoom(index) { appState.rooms.splice(index, 1); renderUI(); }
        
        function resetData() {
            if(!confirm("Are you sure you want to clear all data? This cannot be undone.")) return;
            appState = { batches: [], rooms: [] };
            document.getElementById('uniName').value = '';
            document.getElementById('deptName').value = '';
            document.getElementById('examDate').value = '';
            document.getElementById('examShift').value = '';
            
            document.getElementById('printArea').classList.add('hidden');
            document.getElementById('printBtn').classList.add('hidden');
            
            renderUI();
        }

        // Core Algorithm
        function generatePlan() {
            // Setup Format Details for Print Headers
            const uniName = document.getElementById('uniName').value || "University Name Not Set";
            const deptName = document.getElementById('deptName').value || "Department Not Set";
            const shiftStr = document.getElementById('examShift').value || "Shift Not Set";
            
            let rawDate = document.getElementById('examDate').value;
            let formattedDate = rawDate;
            if(rawDate) {
                const d = new Date(rawDate);
                formattedDate = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            } else {
                formattedDate = "Date Not Set";
            }

            const printArea = document.getElementById('printArea');
            const warningsArea = document.getElementById('warningsArea');
            const roomsOutput = document.getElementById('roomsOutput');
            const printBtn = document.getElementById('printBtn');
            
            printArea.classList.remove('hidden');
            printBtn.classList.remove('hidden');
            warningsArea.classList.add('hidden');
            warningsArea.innerHTML = '';
            roomsOutput.innerHTML = '';

            // 1. Expand batches into individual students
            let allStudents = [];
            appState.batches.forEach(b => {
                for (let i = 1; i <= b.count; i++) {
                    let rollNo = b.prefix + String(i).padStart(2, '0');
                    allStudents.push({ rollNo: rollNo, batchName: b.name });
                }
            });

            // 2. Prepare empty grids for rooms
            let roomGrids = appState.rooms.map(r => {
                return {
                    name: r.name,
                    rows: r.rows,
                    cols: r.cols,
                    grid: Array.from({ length: r.rows }, () => Array(r.cols).fill(null))
                };
            });

            // 3. Helper to get next best student to place based on exclusions
            function getNextStudentByExclusion(excludeBatches) {
                let counts = {};
                allStudents.forEach(s => counts[s.batchName] = (counts[s.batchName] || 0) + 1);
                let sortedBatches = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);

                // Try to find a batch not in the exclusion list
                for (let batch of sortedBatches) {
                    if (!excludeBatches.includes(batch)) {
                        let idx = allStudents.findIndex(s => s.batchName === batch);
                        return allStudents.splice(idx, 1)[0];
                    }
                }

                // Break rule if necessary (no safe options left)
                if (allStudents.length > 0) {
                    let idx = allStudents.findIndex(s => s.batchName === sortedBatches[0]);
                    let student = allStudents.splice(idx, 1)[0];
                    student.ruleBroken = true;
                    return student;
                }
                return null;
            }

            // 4. Fill grids using MAXIMUM DISTANCE CHECKERBOARD PATTERN
            roomGrids.forEach(room => {
                let seats = [];
                for (let r = 0; r < room.rows; r++) {
                    for (let c = 0; c < room.cols; c++) {
                        seats.push({r, c});
                    }
                }
                
                // Sort seats to prioritize spreading out. 
                // We fill "Even" parity seats first across the grid, then "Odd" parity.
                // This ensures if we have fewer students than capacity, they sit far apart.
                seats.sort((a, b) => {
                    let parityA = (a.r + a.c) % 2;
                    let parityB = (b.r + b.c) % 2;
                    if (parityA !== parityB) return parityA - parityB; // 0s first, 1s second
                    if (a.c !== b.c) return a.c - b.c; // Fill column by column within same parity
                    return a.r - b.r;
                });

                for (let seat of seats) {
                    if (allStudents.length === 0) break;
                    let r = seat.r;
                    let c = seat.c;
                    
                    // Look around this specific seat
                    let neighbors = [
                        r > 0 ? room.grid[r-1][c] : null,
                        r < room.rows - 1 ? room.grid[r+1][c] : null,
                        c > 0 ? room.grid[r][c-1] : null,
                        c < room.cols - 1 ? room.grid[r][c+1] : null
                    ];
                    
                    // Filter out empty seats (nulls) and get active batch names next to us
                    let adjacentBatches = neighbors
                        .filter(n => n !== null)
                        .map(n => n.batchName);
                        
                    let student = getNextStudentByExclusion(adjacentBatches);
                    if (student) {
                        room.grid[r][c] = student;
                    }
                }
            });

            // 5. Warnings for unseated
            if (allStudents.length > 0) {
                warningsArea.classList.remove('hidden');
                let unseatedHtml = `<h3 class="font-bold mb-2 flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> Capacity Exceeded!</h3>`;
                unseatedHtml += `<p class="text-sm mb-2">The following <strong>${allStudents.length} students</strong> could not be seated due to lack of chairs:</p>`;
                unseatedHtml += `<div class="flex flex-wrap gap-2">`;
                allStudents.forEach(s => {
                    unseatedHtml += `<span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded border border-red-200">${s.rollNo} (${s.batchName})</span>`;
                });
                unseatedHtml += `</div>`;
                warningsArea.innerHTML = unseatedHtml;
            }

            // 6. Render the tables with Per-Room Page Breaks
            roomGrids.forEach((room, index) => {
                let html = `
                <div class="room-page">
                    <!-- Print-Only Header specific to this room -->
                    <div class="hidden print:block text-center mb-6 border-b-2 border-gray-800 pb-4">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">${uniName}</h1>
                        <h2 class="text-lg font-semibold text-gray-700 mt-1">${deptName}</h2>
                        <div class="mt-4 flex flex-wrap justify-center gap-x-8 gap-y-2 text-sm font-medium">
                            <p><strong>Date:</strong> ${formattedDate}</p>
                            <p><strong>Shift:</strong> ${shiftStr}</p>
                            <p class="text-blue-800 border px-2 py-0.5 rounded bg-blue-50"><strong>Room Allocated:</strong> ${room.name}</p>
                        </div>
                    </div>

                    <!-- Screen Title -->
                    <h3 class="text-xl font-bold text-gray-800 mb-2 border-l-4 border-blue-600 pl-3 print:hidden">Room: ${room.name}</h3>
                    <p class="text-sm text-gray-500 mb-4 ml-4 print:hidden">Grid Layout: ${room.rows} Rows x ${room.cols} Columns</p>
                    
                    <div class="overflow-x-auto">
                        <table class="grid-table w-full bg-white">
                            <thead>
                                <tr>
                                    <th class="w-12">Row</th>
                                    ${Array.from({ length: room.cols }, (_, i) => `<th>Col ${i + 1}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                `;

                for (let r = 0; r < room.rows; r++) {
                    html += `<tr><td class="bg-gray-50 font-semibold text-gray-600">${r + 1}</td>`;
                    for (let c = 0; c < room.cols; c++) {
                        let cell = room.grid[r][c];
                        if (cell) {
                            let cellClass = cell.ruleBroken ? 'seat-error' : '';
                            html += `<td class="${cellClass}">
                                <div class="font-bold text-gray-900">${cell.rollNo}</div>
                                <div class="text-[10px] text-gray-500 font-medium tracking-wide mt-1">${cell.batchName}</div>
                            </td>`;
                        } else {
                            html += `<td class="text-gray-300 text-xs italic bg-gray-50">Empty</td>`;
                        }
                    }
                    html += `</tr>`;
                }
                html += `</tbody></table></div></div>`;
                roomsOutput.innerHTML += html;
            });
            
            // Scroll to plan on screen
            printArea.scrollIntoView({ behavior: 'smooth' });
        }

        // --- EXCEL EXPORT, IMPORT & SAMPLE DATA (Using SheetJS) ---

        function exportPlan() {
            if (typeof XLSX === 'undefined') {
                alert("Excel library is still loading. Please try again in a moment.");
                return;
            }
            let wb = XLSX.utils.book_new();

            // Sheet 1: Details
            let detailsData = [
                { Key: "University", Value: document.getElementById('uniName').value },
                { Key: "Department", Value: document.getElementById('deptName').value },
                { Key: "Date", Value: document.getElementById('examDate').value },
                { Key: "Shift", Value: document.getElementById('examShift').value }
            ];
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailsData), "Exam Details");

            // Sheet 2: Batches
            let batchesData = appState.batches.map(b => ({ "Program Name": b.name, "Total Students": b.count, "Roll Prefix": b.prefix }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(batchesData), "Batches");

            // Sheet 3: Rooms
            let roomsData = appState.rooms.map(r => ({ "Room Name": r.name, "Rows": r.rows, "Columns": r.cols }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(roomsData), "Rooms");

            // Trigger Download
            let fileName = `Seating_Plan_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);
        }

        function importPlan(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    
                    // Parse Details
                    if(workbook.Sheets["Exam Details"]) {
                        let details = XLSX.utils.sheet_to_json(workbook.Sheets["Exam Details"]);
                        details.forEach(row => {
                            if(row.Key === "University") document.getElementById('uniName').value = row.Value || '';
                            if(row.Key === "Department") document.getElementById('deptName').value = row.Value || '';
                            if(row.Key === "Date") document.getElementById('examDate').value = row.Value || '';
                            if(row.Key === "Shift") document.getElementById('examShift').value = row.Value || '';
                        });
                    }

                    // Parse Batches
                    if(workbook.Sheets["Batches"]) {
                        let parsedBatches = XLSX.utils.sheet_to_json(workbook.Sheets["Batches"]);
                        appState.batches = parsedBatches.map((b, i) => ({
                            id: Date.now() + i,
                            name: b["Program Name"] || b.Name,
                            count: parseInt(b["Total Students"] || b.Count),
                            prefix: b["Roll Prefix"] || b.Prefix
                        }));
                    }

                    // Parse Rooms
                    if(workbook.Sheets["Rooms"]) {
                        let parsedRooms = XLSX.utils.sheet_to_json(workbook.Sheets["Rooms"]);
                        appState.rooms = parsedRooms.map((r, i) => ({
                            id: Date.now() + i + 1000,
                            name: r["Room Name"] || r.Name,
                            rows: parseInt(r.Rows),
                            cols: parseInt(r.Columns || r.Cols)
                        }));
                    }

                    renderUI();
                    document.getElementById('printArea').classList.add('hidden');
                    document.getElementById('printBtn').classList.add('hidden');
                    alert("Excel data imported successfully!");
                } catch (error) {
                    console.error(error);
                    alert("Error reading Excel file. Make sure it's the correct format (download Sample Excel to check).");
                }
                // Reset file input so same file can be loaded again if needed
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function downloadSample() {
            if (typeof XLSX === 'undefined') {
                alert("Excel library is still loading. Please try again in a moment.");
                return;
            }
            let wb = XLSX.utils.book_new();

            // Sample Details
            let detailsData = [
                { Key: "University", Value: "Example Technical University" },
                { Key: "Department", Value: "Faculty of Engineering" },
                { Key: "Date", Value: "2027-05-15" },
                { Key: "Shift", Value: "Morning Shift (9:00 AM - 12:00 PM)" }
            ];
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailsData), "Exam Details");

            // Sample Batches
            let batchesData = [
                { "Program Name": "B.Tech CS 2024", "Total Students": 60, "Roll Prefix": "CS24-" },
                { "Program Name": "B.Tech ME 2024", "Total Students": 45, "Roll Prefix": "ME24-" }
            ];
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(batchesData), "Batches");

            // Sample Rooms
            let roomsData = [
                { "Room Name": "Hall A", "Rows": 8, "Columns": 8 },
                { "Room Name": "Hall B", "Rows": 10, "Columns": 5 }
            ];
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(roomsData), "Rooms");

            XLSX.writeFile(wb, "Sample_Seating_Data.xlsx");
        }

        // Initialize UI
        renderUI();
    </script>
</body>
